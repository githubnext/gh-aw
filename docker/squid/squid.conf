# Squid proxy configuration for MCP network permissions testing
# This configuration implements network isolation with domain whitelisting

# Basic network configuration
http_port 3128

# DNS configuration for proxy
dns_nameservers 8.8.8.8 8.8.4.4

# Cache configuration (disabled for security/privacy)
cache deny all

# ACL definitions for network security

# Define standard ports for security
acl SSL_ports port 443
acl Safe_ports port 80        # http
acl Safe_ports port 443       # https
acl CONNECT method CONNECT

# Local network access control
acl localnet src 10.0.0.0/8      # RFC1918 possible internal network
acl localnet src 172.16.0.0/12   # RFC1918 possible internal network
acl localnet src 192.168.0.0/16  # RFC1918 possible internal network
acl localnet src fc00::/7         # RFC 4193 local private network range
acl localnet src fe80::/10        # RFC 4291 link-local (directly plugged) machines

# Domain whitelist - critical security control
acl allowed_domains dstdomain "/etc/squid/allowed_domains.txt"

# Access control rules - ORDER MATTERS

# Deny requests to unsafe ports
http_access deny !Safe_ports

# Deny CONNECT to non-SSL ports
http_access deny CONNECT !SSL_ports

# Allow localhost manager access
http_access allow localhost manager
http_access deny manager

# CRITICAL: Block all non-whitelisted domains
http_access deny !allowed_domains

# Allow local network access if the destination is in allowed domains
http_access allow localnet allowed_domains
http_access allow localhost allowed_domains

# Deny all other access
http_access deny all

# Logging configuration for security monitoring
access_log /var/log/squid/access.log squid
cache_log /var/log/squid/cache.log

# Privacy and security settings
forwarded_for delete
via off

# Disable user agent and referrer headers for privacy
header_access User-Agent deny all
header_access Referer deny all

# Error page customization
error_directory /usr/share/squid/errors/en

# Memory usage
cache_mem 256 MB

# Do not cache anything for security
cache_dir null /tmp