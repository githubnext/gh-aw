version: '3.8'

services:
  squid-proxy:
    image: ubuntu/squid:latest
    container_name: squid-proxy-fetch
    ports:
      - "3128:3128"
    volumes:
      - ./squid/squid.conf:/etc/squid/squid.conf:ro
      - ./squid/allowed_domains.txt:/etc/squid/allowed_domains.txt:ro
    networks:
      - mcp-test-network
    healthcheck:
      test: ["CMD", "squid", "-k", "check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  mcp-fetch-container:
    image: alpine/curl:latest
    container_name: fetch-mcp
    depends_on:
      squid-proxy:
        condition: service_healthy
    environment:
      - http_proxy=http://squid-proxy:3128
      - https_proxy=http://squid-proxy:3128
      - HTTP_PROXY=http://squid-proxy:3128
      - HTTPS_PROXY=http://squid-proxy:3128
    networks:
      - mcp-test-network
    command: ["sleep", "infinity"]
    restart: unless-stopped

networks:
  mcp-test-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16